<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: teal gradient rounded square -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2BBDBD"/>
      <stop offset="100%" stop-color="#3D6EF5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="52%" r="42%">
      <stop offset="0%" stop-color="#3EC9C9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2BBDBD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- Subtle radial glow behind eye -->
  <ellipse cx="256" cy="252" rx="200" ry="130" fill="url(#glow)"/>

  <!-- Eye outer almond shape — white stroke -->
  <path d="M 64 252
           C 64 170, 152 140, 256 140
           C 360 140, 448 170, 448 252
           C 448 334, 360 364, 256 364
           C 152 364, 64 334, 64 252 Z"
        fill="rgba(255,255,255,0.10)"
        stroke="white"
        stroke-width="10"
        stroke-linejoin="round"/>

  <!-- Iris ring (white) -->
  <circle cx="256" cy="252" r="72" fill="rgba(255,255,255,0.08)" stroke="white" stroke-width="8"/>

  <!-- Pupil (teal dark) -->
  <circle cx="256" cy="252" r="42" fill="#1B7B7B"/>

  <!-- Inner pupil white -->
  <circle cx="256" cy="252" r="22" fill="white"/>

  <!-- Cornea highlight -->
  <circle cx="238" cy="235" r="11" fill="white" opacity="0.55"/>
  <circle cx="248" cy="229" r="5"  fill="white" opacity="0.30"/>

  <!-- ECG / pulse trace (white, runs through the eye horizontally) -->
  <polyline
    points="64,252
            148,252
            168,252
            186,244
            200,260
            213,216
            224,296
            235,252
            256,252
            272,252
            448,252"
    fill="none"
    stroke="rgba(255,255,255,0.30)"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <polyline
    points="64,252
            148,252
            168,252
            186,244
            200,260
            213,216
            224,296
            235,252
            256,252
            272,252
            448,252"
    fill="none"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Horus teardrop mark below the eye (vertical stroke) -->
  <line x1="256" y1="364" x2="256" y2="408"
        stroke="rgba(255,255,255,0.7)" stroke-width="9" stroke-linecap="round"/>

  <!-- Horus curl -->
  <path d="M 256 408 Q 298 428, 336 416 Q 362 406, 358 382"
        fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left eye-brow accent line -->
  <path d="M 80 208 Q 165 178, 256 174"
        fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="5"
        stroke-linecap="round"/>
</svg>
